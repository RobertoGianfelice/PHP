<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inserimento nuovo utente</title>
    <style>
        .campo-form {
            margin-bottom: 15px; /* Crea spazio sotto ogni campo */
        }
        body {
            background-color: antiquewhite;
            font-size: 300%;
        }
    </style>
</head>
<body>
    <center><b>Registrazione Utente</b></center>
    <form action="registra.php" enctype="multipart/form-data" method="post">
        <div class="campo-form">
            <label for="name">Nome: </label>
            <input type="text" name="name" id="name"><br>
        </div>
        <div class="campo-form">
            <label for="cognome">Cognome: </label>
            <input type="text" name="cognome" id="cognome"><br>
        </div>
        <div class="campo-form">
            <label for="email">Email: </label>
            <input type="text" name="email" id="email"><br>
        </div>
        <div class="campo-form">
            <label for="nick">Nick Name: </label>
            <input type="text" name="nick" id="nick"><br>
        </div>
        <div class="campo-form">
            <label for="passwd">Password: </label>
            <input type="password" name="passwd" id="passwd"><br>
        </div>
        <div class="campo-form">
            <label for="avatar">Avatar: </label>
            <input type="file" name="avatar" id="avatar" value="Scegli il file"><br>
        </div>
        <div class="campo-form">
            <input type="submit" value="Registrazione">
        </div>
        
    </form>
    <a href="menu.html">HOME</a>
    
</body>
</html>
